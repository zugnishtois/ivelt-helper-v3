<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>iVelt Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      direction: rtl;
    }

    .popup-header {
      padding: 14px 16px 8px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .popup-header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      background: linear-gradient(135deg, #5c9df5, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .popup-header .subtitle {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }

    .main-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 8px 8px 4px;
      padding: 10px 12px;
      background: linear-gradient(135deg, rgba(92,157,245,0.18), rgba(167,139,250,0.12));
      border: 1px solid rgba(92,157,245,0.2);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #c8d8f0;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 500;
      width: calc(100% - 16px);
    }

    .main-link:hover {
      background: linear-gradient(135deg, rgba(92,157,245,0.28), rgba(167,139,250,0.2));
      color: #fff;
      border-color: rgba(92,157,245,0.4);
    }

    .main-link:active { transform: scale(0.98); }

    .actions-list {
      padding: 4px 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: #9098b0;
      font-size: 0.78rem;
      font-family: inherit;
      text-align: right;
      width: 100%;
    }

    .action-btn:hover {
      background: rgba(92, 157, 245, 0.08);
      color: #c0c8e0;
    }

    .action-btn:active { transform: scale(0.98); }

    .action-btn .icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      font-size: 11px;
      flex-shrink: 0;
    }

    .action-btn .icon.home { background: rgba(92,157,245,0.12); color: #5c9df5; }
    .action-btn .icon.custom { background: rgba(167,139,250,0.12); color: #a78bfa; }
    .action-btn .icon.signin { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .action-btn .icon.signout { background: rgba(248,113,113,0.12); color: #f87171; }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.04);
      margin: 2px 12px;
    }

    .footer-row {
      display: flex;
      gap: 4px;
      padding: 4px 6px 8px;
    }

    .footer-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 6px 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      color: #6878a0;
      font-size: 0.7rem;
      font-family: inherit;
    }

    .y24-player {
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      margin: 8px;
      padding: 10px;
      display: none; /* hidden by default */
    }

    .y24-player.active {
      display: block;
    }

    .y24-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .y24-icon {
      background: #dc2626;
      color: white;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .y24-title {
      font-size: 0.75rem;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .y24-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .y24-playbtn {
      background: none;
      border: none;
      color: #5c9df5;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .y24-playbtn:hover {
      color: #a78bfa;
    }

    .y24-progress-container {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }

    .y24-progress-bar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(90deg, #5c9df5, #a78bfa);
      border-radius: 2px;
      width: 0%;
      /* Flip for RTL */
      transform-origin: right;
    }

    html[dir="rtl"] .y24-progress-bar {
      left: auto;
      right: 0;
    }

    .y24-time {
      font-size: 0.65rem;
      color: #9098b0;
      font-variant-numeric: tabular-nums;
      min-width: 35px;
      text-align: left;
    }

    .footer-btn:hover {
      background: rgba(92,157,245,0.08);
      color: #a0b0d0;
      border-color: rgba(92,157,245,0.12);
    }
  </style>
  <script type="module" crossorigin src="/assets/popup.html-CkxTQaOk.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/stateManager-ZPks4XQF.js">
</head>
<body>
  <div class="popup-header">
    <h1>iVelt Pro</h1>
    <div class="subtitle">v1.0.0</div>
  </div>

  <div id="y24-player" class="y24-player">
    <div class="y24-header">
      <div class="y24-icon">Y24</div>
      <div class="y24-title" id="y24-title">לאדירט...</div>
    </div>
    <div class="y24-controls">
      <button class="y24-playbtn" id="y24-playpause">▶</button>
      <div class="y24-progress-container" id="y24-progress-bg">
        <div class="y24-progress-bar" id="y24-progress"></div>
      </div>
      <div class="y24-time" id="y24-time">0:00</div>
    </div>
  </div>

  <button class="main-link" id="openDefault">
    <span>📋</span>
    <span>אקטיווע אשכולות</span>
  </button>

  <div class="actions-list">
    <button class="action-btn" id="openHome">
      <span class="icon home">🏠</span>
      <span>הויפט בלאט</span>
    </button>
    <!-- Custom links from settings will be injected here -->
    <div id="customLinksArea"></div>
    <button class="action-btn" id="quickSignIn" style="display:none;">
      <span class="icon signin">🔑</span>
      <span>לאג אריין</span>
    </button>
    <button class="action-btn" id="emergencySignOut" style="display:none;">
      <span class="icon signout">🚪</span>
      <span>עמערדזשענסי סיין ארויס</span>
    </button>
  </div>

  <div class="divider"></div>

  <div class="footer-row">
    <button class="footer-btn" id="openSettings">
      <span>⚙️</span>
      <span>סעטינגס</span>
    </button>
    <button class="footer-btn" id="openHelp">
      <span>❓</span>
      <span>הילף</span>
    </button>
  </div>

</body>
</html>
